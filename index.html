<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Combustíveis Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    h1 {
      margin: 20px 10px 5px;
    }

    #update {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 12px 22px;
      border-radius: 10px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 15px;
    }

    #container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 280px;
      margin: 12px;
      padding: 20px;
      border-radius: 16px;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .icon {
      font-size: 42px;
    }

    h3 {
      margin: 10px 0;
    }

    .price {
      font-size: 26px;
      font-weight: bold;
      margin: 10px 0;
      color: #38bdf8;
    }

    .min { color: #4ade80; }
    .max { color: #f87171; }

    #status {
      margin: 10px;
      opacity: 0.7;
    }

    /* 📊 GRÁFICO GRANDE */
    #charts {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 40px;
      padding-bottom: 60px;
    }

    canvas {
      width: 95% !important;
      max-width: 1600px;
      height: 520px !important;
      background: rgba(30, 41, 59, 0.35);
      border-radius: 16px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>⛽ Combustíveis Dashboard</h1>

<div id="update"></div>
<button onclick="carregarDados()">🔄 Atualizar</button>

<div id="status">A carregar...</div>

<div id="container"></div>

<div id="charts">
  <canvas id="graficoAtual"></canvas>
</div>

<script>
const API_URL = "https://corsproxy.io/?https://api.apiaberta.pt/v1/fuel/prices";

function getIcon(nome) {
  nome = nome.toLowerCase();

  if (nome.includes("gasolina")) return "⛽";
  if (nome.includes("gasóleo") || nome.includes("gasoleo")) return "🚗";
  if (nome.includes("biodiesel")) return "🌱";

  return "⛽";
}

function formatarData(dataISO) {
  return new Date(dataISO).toLocaleString("pt-PT");
}

let chartAtual;

async function carregarDados() {
  const status = document.getElementById("status");
  const container = document.getElementById("container");
  const update = document.getElementById("update");

  status.innerHTML = "A carregar...";
  container.innerHTML = "";

  try {
    const res = await fetch(API_URL);
    const dados = await res.json();

    const lista = (dados.data || dados)
      .filter(item => item.road_vehicle);

    update.innerHTML = "📅 Atualizado em: " + formatarData(lista[0].updated_at);

    status.innerHTML = "";

    const labels = [];
    const minData = [];
    const avgData = [];
    const maxData = [];

    lista.forEach(item => {
      labels.push(item.fuel_name);
      minData.push(item.min_price_eur);
      avgData.push(item.avg_price_eur);
      maxData.push(item.max_price_eur);

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="icon">${getIcon(item.fuel_name)}</div>
        <h3>${item.fuel_name}</h3>

        <div class="price">💰 ${item.avg_price_eur} €</div>

        <div>
          <span class="min">Min: ${item.min_price_eur} €</span> |
          <span class="max">Máx: ${item.max_price_eur} €</span>
        </div>
      `;

      container.appendChild(div);
    });

    if (chartAtual) chartAtual.destroy();

    const ctx = document.getElementById("graficoAtual").getContext("2d");

    chartAtual = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [
          {
            label: "Mínimo",
            data: minData,
            backgroundColor: "#4ade80"
          },
          {
            label: "Média",
            data: avgData,
            backgroundColor: "#facc15"
          },
          {
            label: "Máximo",
            data: maxData,
            backgroundColor: "#f87171"
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: "white" } }
        },
        scales: {
          x: { ticks: { color: "white" } },
          y: { ticks: { color: "white" } }
        }
      }
    });

  } catch (e) {
    status.innerHTML = "Erro ao carregar dados 😢";
    console.error(e);
  }
}

carregarDados();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Combustíveis Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    h1 {
      margin: 20px 10px 5px;
    }

    #update {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 12px 22px;
      border-radius: 10px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 15px;
    }

    #container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 280px;
      margin: 12px;
      padding: 20px;
      border-radius: 16px;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .icon {
      width: 46px;
      height: 46px;
      margin: 0 auto 10px;
    }

    h3 {
      margin: 10px 0;
    }

    .price {
      font-size: 26px;
      font-weight: bold;
      margin: 10px 0;
      color: #38bdf8;
    }

    .min { color: #4ade80; }
    .max { color: #f87171; }

    #status {
      margin: 10px;
      opacity: 0.7;
    }

    canvas {
      width: 95% !important;
      max-width: 1600px;
      height: 520px !important;
      background: rgba(30, 41, 59, 0.35);
      border-radius: 16px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>⛽ Combustíveis Dashboard</h1>

<div id="update"></div>
<button onclick="carregarDados()">🔄 Atualizar</button>

<div id="status">A carregar...</div>

<div id="container"></div>

<canvas id="graficoAtual"></canvas>

<script>
const API_URL = "https://corsproxy.io/?https://api.apiaberta.pt/v1/fuel/prices";

/* =========================
   🎨 SVG ICONS
========================= */

function iconGasolina() {
  return `
  <svg viewBox="0 0 64 64" fill="none">
    <path d="M20 10h20v44H20z" stroke="white" stroke-width="3"/>
    <path d="M25 18h10M25 26h10M25 34h10" stroke="#38bdf8" stroke-width="3"/>
    <path d="M40 14h6v30c0 4-6 4-6 0V14z" stroke="white" stroke-width="3"/>
  </svg>`;
}

function iconGasoleo() {
  return `
  <svg viewBox="0 0 64 64" fill="none">
    <rect x="18" y="10" width="28" height="44" rx="4" stroke="white" stroke-width="3"/>
    <path d="M22 20h20M22 30h20M22 40h20" stroke="#38bdf8" stroke-width="3"/>
  </svg>`;
}

function iconBiodiesel() {
  return `
  <svg viewBox="0 0 64 64" fill="none">
    <path d="M32 10c10 10 16 18 16 26a16 16 0 1 1-32 0c0-8 6-16 16-26z"
      stroke="#4ade80" stroke-width="3"/>
  </svg>`;
}

function iconGNC() {
  return `
  <svg viewBox="0 0 64 64" fill="none">
    <rect x="20" y="14" width="24" height="36" rx="6" stroke="white" stroke-width="3"/>
    <path d="M24 22h16M24 30h16" stroke="#38bdf8" stroke-width="3"/>
    <circle cx="32" cy="50" r="3" fill="#38bdf8"/>
  </svg>`;
}

function iconGNL() {
  return `
  <svg viewBox="0 0 64 64" fill="none">
    <path d="M32 8c8 12 14 20 14 28a14 14 0 1 1-28 0c0-8 6-16 14-28z"
      stroke="#22d3ee" stroke-width="3"/>
    <path d="M22 40c6 6 14 6 20 0" stroke="#38bdf8" stroke-width="3"/>
  </svg>`;
}

/* ========================= */

function getIcon(nome) {
  nome = nome.toLowerCase();

  if (nome.includes("gasolina")) return iconGasolina();
  if (nome.includes("gasóleo") || nome.includes("gasoleo")) return iconGasoleo();
  if (nome.includes("biodiesel")) return iconBiodiesel();

  // Gases
  if (nome.includes("gnc") || nome.includes("comprimido")) return iconGNC();
  if (nome.includes("gnl") || nome.includes("liquefeito")) return iconGNL();

  return iconGasolina();
}

function formatarData(dataISO) {
  return new Date(dataISO).toLocaleString("pt-PT");
}

let chartAtual;

async function carregarDados() {
  const status = document.getElementById("status");
  const container = document.getElementById("container");
  const update = document.getElementById("update");

  status.innerHTML = "A carregar...";
  container.innerHTML = "";

  try {
    const res = await fetch(API_URL);
    const dados = await res.json();

    const lista = (dados.data || dados)
      .filter(item => item.road_vehicle);

    update.innerHTML = "📅 Atualizado em: " + formatarData(lista[0].updated_at);

    status.innerHTML = "";

    const labels = [];
    const minData = [];
    const avgData = [];
    const maxData = [];

    lista.forEach(item => {
      labels.push(item.fuel_name);
      minData.push(item.min_price_eur);
      avgData.push(item.avg_price_eur);
      maxData.push(item.max_price_eur);

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="icon">${getIcon(item.fuel_name)}</div>
        <h3>${item.fuel_name}</h3>

        <div class="price">💰 ${item.avg_price_eur} €</div>

        <div>
          <span class="min">Min: ${item.min_price_eur} €</span> |
          <span class="max">Máx: ${item.max_price_eur} €</span>
        </div>
      `;

      container.appendChild(div);
    });

    if (chartAtual) chartAtual.destroy();

    const ctx = document.getElementById("graficoAtual").getContext("2d");

    chartAtual = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [
          {
            label: "Mínimo",
            data: minData,
            backgroundColor: "#4ade80"
          },
          {
            label: "Média",
            data: avgData,
            backgroundColor: "#facc15"
          },
          {
            label: "Máximo",
            data: maxData,
            backgroundColor: "#f87171"
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: "white" } }
        },
        scales: {
          x: { ticks: { color: "white" } },
          y: { ticks: { color: "white" } }
        }
      }
    });

  } catch (e) {
    status.innerHTML = "Erro ao carregar dados 😢";
    console.error(e);
  }
}

carregarDados();
</script>

</body>
</html>

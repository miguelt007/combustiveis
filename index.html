<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Combustíveis</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    h1 {
      margin: 20px;
      font-size: 26px;
    }

    #container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 260px;
      margin: 10px;
      padding: 20px;
      border-radius: 16px;
      background: #1e293b;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .price {
      font-size: 22px;
      font-weight: bold;
      margin: 10px 0;
    }

    .minmax {
      font-size: 14px;
      opacity: 0.8;
    }

    /* CORES POR TIPO */
    .gasolina { border-top: 4px solid #facc15; }
    .gasoleo { border-top: 4px solid #38bdf8; }
    .biodiesel { border-top: 4px solid #4ade80; }
    .outro { border-top: 4px solid #a78bfa; }

    #status {
      margin-top: 10px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<h1>⛽ Preços de Combustíveis</h1>
<div id="status">A carregar...</div>
<div id="container"></div>

<script>
const API_URL = "https://corsproxy.io/?https://api.apiaberta.pt/v1/fuel/prices";

// Detectar tipo de combustível
function getTipo(nome) {
  nome = nome.toLowerCase();

  if (nome.includes("gasolina")) return "gasolina";
  if (nome.includes("gasóleo") || nome.includes("gasoleo")) return "gasoleo";
  if (nome.includes("biodiesel")) return "biodiesel";

  return "outro";
}

// Ícones por tipo
function getIcon(tipo) {
  switch (tipo) {
    case "gasolina": return "⛽";
    case "gasoleo": return "🚛";
    case "biodiesel": return "🌱";
    default: return "🔋";
  }
}

async function carregarDados() {
  const status = document.getElementById("status");
  const container = document.getElementById("container");

  try {
    const res = await fetch(API_URL);
    const dados = await res.json();

    const lista = (dados.data || dados)
      .filter(item => item.road_vehicle); // só carros

    status.innerHTML = "";
    container.innerHTML = "";

    lista.forEach(item => {
      const nome = item.fuel_name;
      const preco = item.avg_price_eur;
      const min = item.min_price_eur;
      const max = item.max_price_eur;

      const tipo = getTipo(nome);
      const icon = getIcon(tipo);

      const div = document.createElement("div");
      div.className = "card " + tipo;

      div.innerHTML = `
        <div class="icon">${icon}</div>
        <h2>${nome}</h2>
        <div class="price">${preco} €</div>
        <div class="minmax">Min: ${min} € | Máx: ${max} €</div>
      `;

      container.appendChild(div);
    });

  } catch (e) {
    status.innerHTML = "Erro ao carregar dados 😢";
  }
}

carregarDados();
</script>

</body>
</html>

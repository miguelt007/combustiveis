<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Combustíveis Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    h1 {
      margin: 20px 10px 5px;
    }

    #update {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 12px 22px;
      border-radius: 10px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 15px;
    }

    #container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 300px;
      margin: 12px;
      padding: 20px;
      border-radius: 16px;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .icon {
      font-size: 42px;
    }

    .price {
      font-size: 26px;
      font-weight: bold;
      margin: 10px 0;
      color: #38bdf8;
    }

    .min { color: #4ade80; }
    .max { color: #f87171; }

    /* 📊 gráficos maiores */
    canvas {
      margin: 20px auto 50px;
      max-width: 1100px;
    }

    #charts {
      width: 95%;
      margin: auto;
    }
  </style>
</head>

<body>

<h1>⛽ Combustíveis Dashboard</h1>

<div id="update"></div>
<button onclick="carregarDados()">🔄 Atualizar</button>

<div id="status">A carregar...</div>
<div id="container"></div>

<div id="charts">
  <canvas id="graficoAtual" height="140"></canvas>
  <canvas id="graficoHistorico" height="160"></canvas>
</div>

<script>
const API_URL = "https://corsproxy.io/?https://api.apiaberta.pt/v1/fuel/prices";

function getIcon(nome) {
  nome = nome.toLowerCase();
  if (nome.includes("gasolina")) return "⛽";
  if (nome.includes("gasóleo") || nome.includes("gasoleo")) return "🚗";
  if (nome.includes("biodiesel")) return "🌱";
  return "⛽";
}

function formatarData(dataISO) {
  return new Date(dataISO).toLocaleString("pt-PT");
}

let chartAtual;
let chartHistorico;

async function carregarDados() {
  const status = document.getElementById("status");
  const container = document.getElementById("container");
  const update = document.getElementById("update");

  status.innerHTML = "A carregar...";
  container.innerHTML = "";

  try {
    const res = await fetch(API_URL);
    const dados = await res.json();

    const lista = (dados.data || dados)
      .filter(item => item.road_vehicle);

    update.innerHTML = "📅 Atualizado em: " + formatarData(lista[0].updated_at);

    status.innerHTML = "";

    const labels = [];
    const minData = [];
    const avgData = [];
    const maxData = [];

    // 📈 histórico simulado
    const historicoLabels = ["-4", "-3", "-2", "-1", "Hoje"];
    const historicoDatasets = [];

    lista.forEach((item, index) => {
      labels.push(item.fuel_name);
      minData.push(item.min_price_eur);
      avgData.push(item.avg_price_eur);
      maxData.push(item.max_price_eur);

      const icon = getIcon(item.fuel_name);

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="icon">${icon}</div>
        <h3>${item.fuel_name}</h3>
        <div class="price">💰 ${item.avg_price_eur} €</div>
        <div>
          <span class="min">Min: ${item.min_price_eur} €</span> |
          <span class="max">Máx: ${item.max_price_eur} €</span>
        </div>
      `;

      container.appendChild(div);

      // 📈 gerar “tendência” simulada
      const base = item.avg_price_eur;
      historicoDatasets.push({
        label: item.fuel_name,
        data: [
          base - 0.05,
          base - 0.03,
          base - 0.02,
          base - 0.01,
          base
        ],
        borderWidth: 3,
        fill: false
      });
    });

    // 📊 GRÁFICO ATUAL (MAIOR)
    if (chartAtual) chartAtual.destroy();

    const ctx1 = document.getElementById("graficoAtual").getContext("2d");

    chartAtual = new Chart(ctx1, {
      type: "bar",
      data: {
        labels,
        datasets: [
          {
            label: "Mínimo",
            data: minData,
            backgroundColor: "#4ade80"
          },
          {
            label: "Média",
            data: avgData,
            backgroundColor: "#facc15"
          },
          {
            label: "Máximo",
            data: maxData,
            backgroundColor: "#f87171"
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: "white" } }
        },
        scales: {
          x: { ticks: { color: "white" } },
          y: { ticks: { color: "white" } }
        }
      }
    });

    // 📈 GRÁFICO HISTÓRICO
    if (chartHistorico) chartHistorico.destroy();

    const ctx2 = document.getElementById("graficoHistorico").getContext("2d");

    chartHistorico = new Chart(ctx2, {
      type: "line",
      data: {
        labels: historicoLabels,
        datasets: historicoDatasets
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: "white" } }
        },
        scales: {
          x: { ticks: { color: "white" } },
          y: { ticks: { color: "white" } }
        }
      }
    });

  } catch (e) {
    status.innerHTML = "Erro ao carregar dados 😢";
    console.error(e);
  }
}

carregarDados();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Combustíveis Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      transition: 0.3s;
    }

    body.dark {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    body.light {
      background: #f3f4f6;
      color: #111;
    }

    h1 {
      margin: 20px 10px 5px;
    }

    button {
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
      border: none;
    }

    .btn-blue {
      background: #38bdf8;
      color: black;
    }

    .btn-theme {
      background: #111827;
      color: white;
    }

    body.light .btn-theme {
      background: #e5e7eb;
      color: #111;
    }

    #update {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    #container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 280px;
      margin: 12px;
      padding: 20px;
      border-radius: 16px;
      transition: 0.3s;
    }

    body.dark .card {
      background: rgba(30, 41, 59, 0.7);
      color: white;
    }

    body.light .card {
      background: white;
      color: #111;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    .icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 10px;
    }

    .price {
      font-size: 26px;
      font-weight: bold;
      color: #38bdf8;
    }

    .min { color: #4ade80; }
    .max { color: #f87171; }

    canvas {
      width: 95% !important;
      max-width: 1600px;
      height: 520px !important;
      border-radius: 16px;
      padding: 10px;
    }

    body.dark canvas {
      background: rgba(30, 41, 59, 0.35);
    }

    body.light canvas {
      background: white;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body class="dark">

<h1>⛽ Combustíveis Dashboard</h1>

<div>
  <button class="btn-blue" onclick="carregarDados()">🔄 Atualizar</button>
  <button class="btn-theme" onclick="toggleTheme()">🌙 Modo</button>
</div>

<div id="update"></div>
<div id="status">A carregar...</div>

<div id="container"></div>

<canvas id="graficoAtual"></canvas>

<script>
const API_URL = "https://corsproxy.io/?https://api.apiaberta.pt/v1/fuel/prices";

/* =========================
   🌙 THEME
========================= */

function setTheme(theme) {
  document.body.className = theme;
  localStorage.setItem("theme", theme);
}

function toggleTheme() {
  const current = document.body.classList.contains("dark") ? "dark" : "light";
  setTheme(current === "dark" ? "light" : "dark");
}

setTheme(localStorage.getItem("theme") || "dark");

/* =========================
   🎨 SVG ICONS NOVOS
========================= */

function iconGasolina() {
  return `
  <svg viewBox="0 0 64 64">
    <rect x="18" y="10" width="24" height="44" rx="4" fill="#1f2937"/>
    <rect x="22" y="18" width="16" height="6" fill="#38bdf8"/>
    <rect x="22" y="28" width="16" height="6" fill="#38bdf8"/>
    <rect x="22" y="38" width="16" height="6" fill="#38bdf8"/>
    <rect x="42" y="14" width="6" height="28" rx="2" fill="#374151"/>
  </svg>`;
}

function iconGasoleo() {
  return `
  <svg viewBox="0 0 64 64">
    <rect x="16" y="10" width="32" height="44" rx="6" fill="#111827"/>
    <circle cx="32" cy="30" r="10" fill="#facc15"/>
  </svg>`;
}

function iconBiodiesel() {
  return `
  <svg viewBox="0 0 64 64">
    <path d="M32 8c10 10 16 18 16 28a16 16 0 1 1-32 0c0-10 6-18 16-28z"
      fill="#16a34a"/>
    <path d="M24 38c6-6 10-6 16 0" stroke="white" stroke-width="3"/>
  </svg>`;
}

function iconGNC() {
  return `
  <svg viewBox="0 0 64 64">
    <rect x="20" y="10" width="24" height="44" rx="6" fill="#0f172a"/>
    <rect x="24" y="18" width="16" height="6" fill="#38bdf8"/>
    <rect x="24" y="28" width="16" height="6" fill="#38bdf8"/>
    <circle cx="32" cy="50" r="3" fill="#60a5fa"/>
  </svg>`;
}

function iconGNL() {
  return `
  <svg viewBox="0 0 64 64">
    <path d="M32 6c8 12 16 20 16 30a16 16 0 1 1-32 0c0-10 8-18 16-30z"
      fill="#06b6d4"/>
    <path d="M22 40c6 6 14 6 20 0" stroke="white" stroke-width="3"/>
  </svg>`;
}

function getIcon(nome) {
  nome = nome.toLowerCase();

  if (nome.includes("gasolina")) return iconGasolina();
  if (nome.includes("gasóleo") || nome.includes("gasoleo")) return iconGasoleo();
  if (nome.includes("biodiesel")) return iconBiodiesel();
  if (nome.includes("gnc")) return iconGNC();
  if (nome.includes("gnl")) return iconGNL();

  return iconGasolina();
}

/* ========================= */

function formatarData(dataISO) {
  return new Date(dataISO).toLocaleString("pt-PT");
}

let chartAtual;

async function carregarDados() {
  const status = document.getElementById("status");
  const container = document.getElementById("container");
  const update = document.getElementById("update");

  status.innerHTML = "A carregar...";
  container.innerHTML = "";

  try {
    const res = await fetch(API_URL);
    const dados = await res.json();

    const lista = (dados.data || dados)
      .filter(item => item.road_vehicle);

    update.innerHTML = "📅 Atualizado em: " + formatarData(lista[0].updated_at);

    status.innerHTML = "";

    const labels = [];
    const minData = [];
    const avgData = [];
    const maxData = [];

    lista.forEach(item => {
      labels.push(item.fuel_name);
      minData.push(item.min_price_eur);
      avgData.push(item.avg_price_eur);
      maxData.push(item.max_price_eur);

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="icon">${getIcon(item.fuel_name)}</div>
        <h3>${item.fuel_name}</h3>
        <div class="price">💰 ${item.avg_price_eur} €</div>
        <div>
          <span class="min">Min: ${item.min_price_eur} €</span> |
          <span class="max">Máx: ${item.max_price_eur} €</span>
        </div>
      `;

      container.appendChild(div);
    });

    if (chartAtual) chartAtual.destroy();

    const ctx = document.getElementById("graficoAtual").getContext("2d");

    chartAtual = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [
          { label: "Mínimo", data: minData, backgroundColor: "#4ade80" },
          { label: "Média", data: avgData, backgroundColor: "#facc15" },
          { label: "Máximo", data: maxData, backgroundColor: "#f87171" }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: getComputedStyle(document.body).color } }
        },
        scales: {
          x: { ticks: { color: getComputedStyle(document.body).color } },
          y: { ticks: { color: getComputedStyle(document.body).color } }
        }
      }
    });

  } catch (e) {
    status.innerHTML = "Erro ao carregar dados 😢";
    console.error(e);
  }
}

carregarDados();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Preços de Combustíveis</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
    }

    .card {
      background: #1e293b;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>⛽ Preços de Combustíveis</h1>
<div id="status">A carregar...</div>
<div id="container"></div>

<script>
const API_URL = "https://corsproxy.io/?https://api.apiaberta.pt/v1/fuel/prices";

async function carregarDados() {
  const status = document.getElementById("status");
  const container = document.getElementById("container");

  try {
    const res = await fetch(API_URL);
    const dados = await res.json();

    console.log(dados);

    const lista = dados.data || dados;

    status.innerHTML = "";
    container.innerHTML = "";

    lista.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h2>${item.name || "Combustível"}</h2>
        <p>${item.price || "N/A"} €</p>
      `;

      container.appendChild(div);
    });

  } catch (e) {
    status.innerHTML = "Erro ao carregar dados 😢";
    console.error(e);
  }
}

carregarDados();
</script>

</body>
</html>

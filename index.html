<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Preços de Combustíveis</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }
    h1 {
      margin-top: 20px;
    }
    .card {
      background: #1e1e1e;
      margin: 10px auto;
      padding: 15px;
      border-radius: 10px;
      max-width: 400px;
    }
  </style>
</head>
<body>

  <h1>⛽ Preços de Combustíveis em Portugal</h1>
  <div id="container"></div>

  <script>
    const API_URL = "https://api.apiaberta.pt/v1/fuel/prices";

    async function carregarDados() {
      try {
        const resposta = await fetch(API_URL);
        const dados = await resposta.json();

        const container = document.getElementById("container");
        container.innerHTML = "";

        dados.forEach(item => {
          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <h2>${item.name}</h2>
            <p>Preço: ${item.price} €</p>
          `;

          container.appendChild(div);
        });

      } catch (erro) {
        console.error("Erro ao carregar API:", erro);
        document.getElementById("container").innerHTML =
          "<p>Erro ao carregar dados 😢</p>";
      }
    }

    carregarDados();
  </script>

</body>
</html>

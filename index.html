<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Preços de Combustíveis</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .card {
      background: #1e293b;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
    }

    .price {
      font-size: 18px;
      color: #38bdf8;
    }
  </style>
</head>
<body>

<h1>⛽ Preços de Combustíveis</h1>
<div id="status">A carregar...</div>
<div id="container"></div>

<script>
const API_URL = "https://corsproxy.io/?https://api.apiaberta.pt/v1/fuel/prices";

async function carregarDados() {
  const status = document.getElementById("status");
  const container = document.getElementById("container");

  try {
    const res = await fetch(API_URL);
    const dados = await res.json();

    const lista = dados.data || dados;

    status.innerHTML = "";
    container.innerHTML = "";

    lista.forEach(item => {
      const nome = item.fuel_name;
      const preco = item.avg_price_eur;
      const min = item.min_price_eur;
      const max = item.max_price_eur;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h2>${nome}</h2>
        <p class="price">Média: ${preco} €</p>
        <p>Mín: ${min} € | Máx: ${max} €</p>
      `;

      container.appendChild(div);
    });

  } catch (e) {
    status.innerHTML = "Erro ao carregar dados 😢";
  }
}

carregarDados();
</script>

</body>
</html>
